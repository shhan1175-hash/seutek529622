<body><div id="root"></div>
<script>
const {
  useState,
  useEffect,
  useRef,
  useCallback
} = React;
async function compressImage(dataUrl, maxW = 800, quality = 0.6) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const sc = Math.min(1, maxW / img.width),
        w = Math.round(img.width * sc),
        h = Math.round(img.height * sc);
      const c = document.createElement("canvas");
      c.width = w;
      c.height = h;
      c.getContext("2d").drawImage(img, 0, 0, w, h);
      const result = c.toDataURL("image/jpeg", quality);
      if (result.length > 800000) {
        const c2 = document.createElement("canvas");
        const sc2 = Math.min(1, 600 / w);
        c2.width = Math.round(w * sc2);
        c2.height = Math.round(h * sc2);
        c2.getContext("2d").drawImage(img, 0, 0, c2.width, c2.height);
        resolve(c2.toDataURL("image/jpeg", 0.5));
      } else resolve(result);
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}
const LC = {
  get: (k, d) => {
    try {
      const v = localStorage.getItem(k);
      return v != null ? JSON.parse(v) : d;
    } catch {
      try {
        const v = sessionStorage.getItem(k);
        return v != null ? JSON.parse(v) : d;
      } catch {
        return d;
      }
    }
  },
  set: (k, v) => {
    try {
      localStorage.setItem(k, JSON.stringify(v));
    } catch {
      try {
        sessionStorage.setItem(k, JSON.stringify(v));
      } catch {}
    }
  },
  remove: k => {
    try {
      localStorage.removeItem(k);
    } catch {}
    try {
      sessionStorage.removeItem(k);
    } catch {}
  }
};
const FB = {
  _url(u) {
    return u.replace(/\/+$/, "") + "/vpc.json";
  },
  async load(u) {
    const res = await fetch(FB._url(u));
    if (!res.ok) throw new Error(`불러오기 실패 (${res.status})`);
    return (await res.json()) || {};
  },
  async save(u, data) {
    const res = await fetch(FB._url(u), {
      method: "PUT",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error(`저장 실패 (${res.status})`);
    return await res.json();
  },
  async patchSubmission(u, stuId, data) {
    const url = u.replace(/\/+$/, "") + `/vpc/submissions/${stuId}.json`;
    const res = await fetch(url, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error(`제출 저장 실패 (${res.status})`);
    return await res.json();
  },
  async loadLight(u) {
    const base = u.replace(/\/+$/, "");
    const res = await fetch(base + "/vpc.json");
    if (!res.ok) throw new Error(`불러오기 실패 (${res.status})`);
    const data = (await res.json()) || {};
    if (data.submissions) {
      const strip = s => {
        const r = {
          ...s,
          answers: {}
        };
        Object.keys(s.answers || {}).forEach(qid => {
          const a = s.answers[qid] || {};
          r.answers[qid] = {
            text: a.text,
            subImgTexts: a.subImgTexts,
