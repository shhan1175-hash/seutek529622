/* ══ 이미지 압축 — 모바일 튕김 방지용 강화 압축 ══ */
async function compressImage(dataUrl,maxW=800,quality=0.6){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const sc=Math.min(1,maxW/img.width),w=Math.round(img.width*sc),h=Math.round(img.height*sc);
      const c=document.createElement("canvas");c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      const result=c.toDataURL("image/jpeg",quality);
      // 여전히 너무 크면 한 번 더 압축
      if(result.length>800000){
        const c2=document.createElement("canvas");
        const sc2=Math.min(1,600/w);c2.width=Math.round(w*sc2);c2.height=Math.round(h*sc2);
        c2.getContext("2d").drawImage(img,0,0,c2.width,c2.height);
        resolve(c2.toDataURL("image/jpeg",0.5));
      } else resolve(result);
    };
    img.onerror=()=>resolve(dataUrl);img.src=dataUrl;
  });
}

/* ══ 드라이브 업로드 ══ */
function extractFolderId(url){
  if(!url||!url.startsWith("http"))return null;
  const m=url.match(/\/folders\/([a-zA-Z0-9_-]{20,})/);
  return m?m[1]:null;
}
async function uploadToDrive(appsScriptUrl,base64Data,rootFolderId,studentName,studentId,fileName){
  if(!appsScriptUrl||!base64Data||!studentName||!fileName)return;
  try{
    const fd=new FormData();
    if(rootFolderId)fd.append("rootFolderId",rootFolderId);
    fd.append("studentName",studentName);fd.append("studentId",studentId||"");
    fd.append("fileName",fileName);fd.append("base64Data",base64Data);fd.append("mimeType","image/jpeg");
    await fetch(appsScriptUrl,{method:"POST",mode:"no-cors",body:fd});
  }catch(e){console.warn("Drive 업로드 오류:",e.message);}
}
async function uploadAllPhotos({appsScriptUrl,rootUrl,driveUrls,stuId,stuName,qid,qTitle,qIdx,answers}){
  if(!appsScriptUrl)return;
  const folderUrl=driveUrls[stuId]||rootUrl;
  const rootFolderId=extractFolderId(folderUrl)||null;
  const ans=answers[qid]||{};
  const lbl=`활동${qIdx+1}_${(qTitle||qid).replace(/[^\w가-힣]/g,"").slice(0,10)}`;
  const ups=[];
  if(ans.mainPhoto)ups.push(uploadToDrive(appsScriptUrl,ans.mainPhoto,rootFolderId,stuName,stuId,`${stuId}_${stuName}_${lbl}_답변사진.jpg`));
  if(ans.questionPhoto)ups.push(uploadToDrive(appsScriptUrl,ans.questionPhoto,rootFolderId,stuName,stuId,`${stuId}_${stuName}_${lbl}_문항전체.jpg`));
  Object.entries(ans.subImgs||{}).forEach(([si,d])=>{if(d)ups.push(uploadToDrive(appsScriptUrl,d,rootFolderId,stuName,stuId,`${stuId}_${stuName}_${lbl}_추가${Number(si)+1}.jpg`));});
  if(ups.length)await Promise.allSettled(ups);
}

async function callAI(prompt,engine,keys){

  if(engine==="Gemini"){const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${keys.gemini}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:1200}})});const d=await r.json();if(d.error)throw new Error(d.error.message);return d.candidates?.[0]?.content?.parts?.[0]?.text||"";}
  if(engine==="ChatGPT"){const r=await fetch("https://api.openai.com/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${keys.openai}`},body:JSON.stringify({model:"gpt-4o",max_tokens:1200,messages:[{role:"user",content:prompt}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);return d.choices?.[0]?.message?.content||"";}
  throw new Error("알 수 없는 AI 엔진");
}

/* ★ 이미지 업로드 — 압축 후 저장, 진행 상태 표시 */
function ImgUpload({value,onChange,label="📷 사진 업로드"}){
  const ref=useRef();const [processing,setProcessing]=useState(false);
  const hf=async e=>{
    const f=e.target.files[0];if(!f)return;
    setProcessing(true);
    try{
      const raw=await new Promise((res,rej)=>{const r=new FileReader();r.onload=ev=>res(ev.target.result);r.onerror=rej;r.readAsDataURL(f);});
      const compressed=await compressImage(raw,800,0.6);
      onChange(compressed);
    }catch(err){alert("이미지 처리 오류: "+err.message);}
    setProcessing(false);e.target.value="";
  };
  return(<div>
    {value
      ?<div style={{position:"relative",marginBottom:".4rem"}}>
        <img src={value} alt="" style={{maxWidth:"100%",maxHeight:200,borderRadius:9,border:"1.5px solid #e2dcf5",display:"block"}}/>
        <button onClick={()=>onChange(null)} style={{position:"absolute",top:6,right:6,background:"rgba(0,0,0,.55)",border:"none",borderRadius:"50%",width:26,height:26,color:"#fff",cursor:"pointer",fontSize:".9rem",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
      </div>
      :<div onClick={()=>!processing&&ref.current.click()} style={{border:"1.5px dashed #cec8ea",borderRadius:9,padding:"1rem",textAlign:"center",cursor:processing?"wait":"pointer",background:"#fafcff",color:"#8882a8",fontSize:".84rem",lineHeight:1.7}}>
        {processing?<><div style={{width:20,height:20,border:"2px solid #cec8ea",borderTopColor:cv.lav,borderRadius:"50%",animation:"spin 1s linear infinite",margin:"0 auto .4rem"}}/><span>압축 중...</span></>:<>{label}<br/><span style={{fontSize:".74rem"}}>jpg, png — 자동 압축됨</span></>}
      </div>}
    <input ref={ref} type="file" accept="image/*" style={{display:"none"}} onChange={hf}/>
  </div>);
}

function PoemImageManager({images,onChange}){
  const ref=useRef();const [editIdx,setEditIdx]=useState(null);const [lbl,setLbl]=useState("");

    const f=e.target.files[0];if(!f)return;if(images.length>=3){alert("최대 3개");return;}
    const r=new FileReader();
    r.onload=async ev=>{const compressed=await compressImage(ev.target.result,800,0.65);onChange([...images,{dataUrl:compressed,label:`시/지문 ${images.length+1}`}]);};

  };
  const del=i=>{const n=[...images];n.splice(i,1);onChange(n);};
  const save=i=>{const n=[...images];n[i]={...n[i],label:lbl};onChange(n);setEditIdx(null);};

}

            </div>
            {q.videoUrl&&videoOpen&&(<div style={{borderRadius:10,overflow:"hidden",marginBottom:"1rem",background:"#000",position:"relative",paddingTop:"56.25%"}}><iframe src={getEmbedUrl(q.videoUrl)} title="학습 영상" allowFullScreen allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",border:"none"}}/></div>)}
            {q.rubric?.length>0&&<div style={{display:"flex",gap:".3rem",flexWrap:"wrap",marginBottom:".8rem"}}>{q.rubric.map(r=><span key={r} style={pill(cv.peachLt,cv.peachDk,cv.peachMd)}>◆ {r}</span>)}</div>}

            {(q.poemImages||[]).length>0&&(<div style={{background:cv.skyLt,border:`1.5px solid ${cv.skyMd}`,borderRadius:10,padding:".8rem .95rem",marginBottom:".9rem"}}>
              <div style={{fontWeight:800,fontSize:".85rem",color:"#1a5f8a",marginBottom:".55rem"}}>📜 지문 / 시</div>
              {q.poemImages.length===1
                ?<img src={q.poemImages[0].dataUrl} alt="" style={{maxWidth:"100%",borderRadius:8,border:`1.5px solid ${cv.border}`,display:"block",maxHeight:420,objectFit:"contain"}}/>
                :<div><select style={inp()} value={ans.poemSel||""} onChange={e=>updAns("poemSel",e.target.value)}><option value="">-- 선택 --</option>{q.poemImages.map((pi,i)=><option key={i} value={pi.label}>{pi.label}</option>)}</select>{q.poemImages.find(p=>p.label===ans.poemSel)&&<div style={{marginTop:".65rem"}}><img src={q.poemImages.find(p=>p.label===ans.poemSel).dataUrl} alt="" style={{maxWidth:"100%",borderRadius:8,border:`1.5px solid ${cv.border}`,display:"block",maxHeight:420,objectFit:"contain"}}/></div>}</div>}
            </div>)}

            <div style={{background:"#fffbf0",borderLeft:`3px solid ${cv.peachMd}`,padding:".85rem 1rem",borderRadius:"0 9px 9px 0",marginBottom:".9rem"}}>
              <div style={{display:"flex",alignItems:"center",gap:".45rem",marginBottom:".45rem"}}><span style={pill(cv.peachLt,cv.peachDk,cv.peachMd)}>1단계</span><span style={{fontWeight:800,fontSize:".82rem",color:cv.peachDk}}>기본문항 답변</span></div>
              <div style={{fontWeight:700,fontSize:".9rem",lineHeight:1.85,color:cv.ink2,whiteSpace:"pre-line"}}>{q.question}</div>
              {(q.subQuestions||[]).filter(s=>s).length>0&&(<div style={{marginTop:".55rem",paddingTop:".55rem",borderTop:`1px dashed ${cv.peachMd}`}}>{(q.subQuestions||[]).map((sq,si)=>sq&&(<div key={si} style={{fontWeight:700,fontSize:".88rem",lineHeight:1.85,color:cv.ink2,display:"flex",gap:".4rem"}}><span style={{color:cv.peachDk,flexShrink:0}}>{si+1})</span><span>{sq}</span></div>))}</div>)}
            </div>

            <div style={{background:"#f5f0ff",border:`1.5px solid ${cv.lavMd}`,borderRadius:10,padding:".8rem .95rem",marginBottom:".75rem"}}>
              <div style={{display:"flex",alignItems:"center",gap:".45rem",marginBottom:".55rem"}}>
                <span style={pill(cv.lavLt,cv.lav,cv.lavMd)}>📷 답변 사진</span>
                <span style={{fontSize:".8rem",color:cv.ink2,fontWeight:600}}>촬영 → AI 텍스트 자동 변환</span>
              </div>
              <ImgUpload value={ans.mainPhoto||null} onChange={v=>{updAns("mainPhoto",v);if(!v)setOcrDone(p=>({...p,[mainOcrKey]:false}));}} label="📷 답변 사진 업로드"/>
              {ans.mainPhoto&&!isSubmitted&&(<div style={{marginTop:".6rem",display:"flex",alignItems:"center",gap:".6rem",flexWrap:"wrap"}}>
                <button onClick={()=>runOCR(curQ,ans.mainPhoto,"main")} disabled={!!ocrLoading[mainOcrKey]} style={{...btn(`linear-gradient(135deg,${cv.lav},#9b59b6)`),fontSize:".82rem",padding:".42rem 1rem",opacity:ocrLoading[mainOcrKey]?.6:1,display:"flex",alignItems:"center",gap:".4rem"}}>
                  {ocrLoading[mainOcrKey]?<><div style={{width:13,height:13,border:"2px solid rgba(255,255,255,.4)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>인식 중...</>:"🔍 AI 텍스트 인식 → 답변 칸 자동 입력"}
                </button>
                {ocrDone[mainOcrKey]&&<span style={{fontSize:".78rem",color:cv.mint,fontWeight:700}}>✅ 인식 완료</span>}
              </div>)}
            </div>

            <textarea style={{...inp(),minHeight:130,resize:"vertical",lineHeight:1.85,background:isSubmitted?"#f8fff8":"#fafcff",marginBottom:".35rem"}} placeholder={q.placeholder||"답변을 직접 입력하거나 사진 촬영 후 AI 인식을 이용하세요..."} value={ans.text} maxLength={q.maxLen} onChange={e=>updAns("text",e.target.value)} readOnly={isSubmitted}/>
            <div style={{textAlign:"right",fontSize:".74rem",color:cnt>q.maxLen*.9?cv.rose:cv.muted,marginBottom:"1rem",fontWeight:cnt>q.maxLen*.9?700:400}}>{cnt} / {q.maxLen}자</div>

            {hasSubQs&&(<>
              <div style={{display:"flex",alignItems:"center",gap:".45rem",marginBottom:".7rem"}}><span style={pill(cv.peachLt,cv.peachDk,cv.peachMd)}>2단계</span><span style={{fontWeight:800,fontSize:".88rem",color:cv.peachDk}}>추가문항 수기 답변 사진</span></div>
              <div style={{display:"flex",flexDirection:"column",gap:".7rem",marginBottom:"1.2rem"}}>
                {(q.subQuestions||[]).map((sq,si)=>{
                  if(!sq)return null;
                  const subKey=`${qid}_${si}`;const subImg=(ans.subImgs||{})[si]||null;const subTxt=(ans.subImgTexts||{})[si]||"";
                  return(<div key={si} style={{background:"#f8f4ff",border:`1.5px solid ${cv.lavMd}`,borderRadius:10,padding:".8rem .95rem"}}>
                    <div style={{fontWeight:800,fontSize:".84rem",color:cv.lav,marginBottom:".3rem"}}>{si+1}) {sq}</div>
                    <ImgUpload value={subImg} onChange={v=>setAnswers(p=>({...p,[qid]:{...(p[qid]||{}),subImgs:{...((p[qid]||{}).subImgs||{}),[si]:v}}}))} label="📷 수기 답변 사진"/>
                    {subImg&&(<div style={{marginTop:".6rem"}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:".3rem"}}><span style={{fontSize:".77rem",fontWeight:700,color:cv.ink2}}>OCR 결과</span><button onClick={()=>runOCR(curQ,subImg,si)} disabled={!!ocrLoading[subKey]} style={{...btn(`linear-gradient(135deg,${cv.lav},#9b59b6)`),fontSize:".74rem",padding:".28rem .75rem",opacity:ocrLoading[subKey]?.6:1}}>{ocrLoading[subKey]?"⏳":"🔍 AI 읽기"}</button></div>
                      <textarea style={{...inp(),minHeight:68,resize:"vertical",lineHeight:1.8,background:"#fafcff"}} value={subTxt} onChange={e=>setAnswers(p=>({...p,[qid]:{...(p[qid]||{}),subImgTexts:{...((p[qid]||{}).subImgTexts||{}),[si]:e.target.value}}}))} placeholder="OCR 결과 또는 직접 입력..."/>
                    </div>)}
                  </div>);
                })}
              </div>
            </>)}

            <div style={{background:cv.mintLt,border:`1.5px solid ${cv.mintMd}`,borderRadius:10,padding:".85rem .95rem",marginBottom:"1rem"}}>
              <div style={{display:"flex",alignItems:"center",gap:".45rem",marginBottom:".5rem"}}><span style={pill(cv.mintLt,cv.mint,cv.mintMd)}>3단계</span><span style={{fontWeight:800,fontSize:".88rem",color:cv.mint}}>이 문항 페이지 전체 사진</span></div>
              <div style={{fontSize:".8rem",color:cv.ink2,marginBottom:".65rem",lineHeight:1.6}}>현재 문항이 작성된 <strong>이 페이지 전체</strong>를 촬영하여 업로드해주세요.</div>
              <ImgUpload value={ans.questionPhoto||null} onChange={v=>updAns("questionPhoto",v)} label="📷 이 문항 페이지 사진"/>
              {ans.questionPhoto&&<div style={{marginTop:".45rem",fontSize:".77rem",color:cv.mint,fontWeight:700}}>✅ 사진 첨부 완료</div>}
            </div>

            {isRejected&&(<div style={{background:"#fff4ec",border:`2px solid #ffcba4`,borderRadius:10,padding:".85rem 1rem",marginBottom:"1rem"}}><div style={{fontWeight:800,fontSize:".88rem",color:"#c05c1a",marginBottom:".35rem",animation:"pulse 1.5s ease infinite"}}>⚠ 교사 반려 피드백</div>{ans.rejectionNote&&<div style={{fontSize:".85rem",color:cv.ink2,lineHeight:1.7,marginBottom:".5rem",background:"rgba(255,255,255,.8)",padding:".5rem .75rem",borderRadius:7}}>{ans.rejectionNote}</div>}<div style={{fontSize:".8rem",color:"#c05c1a"}}>답변과 사진을 수정한 후 다시 제출해주세요.</div></div>)}
            {submitErr[qid]&&(<div style={{background:cv.roseLt,border:`1.5px solid ${cv.roseMd}`,borderRadius:9,padding:".65rem 1rem",marginBottom:".8rem",fontSize:".82rem",color:cv.rose,fontWeight:700}}>{submitErr[qid]}</div>)}
            {uploadSt==="uploading"&&(<div style={{background:"#e8f4fd",border:`1.5px solid ${cv.skyMd}`,borderRadius:9,padding:".55rem 1rem",marginBottom:".8rem",display:"flex",alignItems:"center",gap:".55rem"}}><div style={{width:14,height:14,border:`2px solid ${cv.skyMd}`,borderTopColor:"#1a7ab0",borderRadius:"50%",animation:"spin 1s linear infinite",flexShrink:0}}/><span style={{fontSize:".82rem",color:"#1a5f8a",fontWeight:700}}>📤 드라이브 업로드 중...</span></div>)}
            {uploadSt==="done"&&(<div style={{background:"#e6f9f2",border:`1.5px solid ${cv.mintMd}`,borderRadius:9,padding:".5rem 1rem",marginBottom:".8rem",fontSize:".82rem",color:cv.mint,fontWeight:700}}>✅ 드라이브 업로드 완료</div>)}

            {isSubmitted
              ?(<div style={{background:cv.mintLt,border:`1.5px solid ${cv.mintMd}`,borderRadius:10,padding:".75rem 1rem",display:"flex",alignItems:"center",justifyContent:"space-between"}}><div><div style={{fontWeight:800,fontSize:".88rem",color:cv.mint}}>✅ 활동 제출 완료</div><div style={{fontSize:".75rem",color:cv.muted,marginTop:".15rem"}}>{ans.submittedAt}</div></div><span style={pill(cv.mintLt,cv.mint,cv.mintMd)}>제출됨</span></div>)
              :(<button onClick={()=>submitActivity(qid)} disabled={!!submitting[qid]} style={{...btn(`linear-gradient(135deg,${isRejected?"#c05c1a,#e67e22":cv.lav+",#9b59b6"})`),width:"100%",padding:".85rem",fontSize:".95rem",fontWeight:800,borderRadius:10,opacity:submitting[qid]?.6:1}}>{submitting[qid]?"⏳ 서버에 저장 중...":(isRejected?"↺ 다시 제출하기":"이 활동 제출하기 ✓")}</button>)
            }
          </div>

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:"1.1rem",borderTop:`1.5px solid ${cv.border}`}}>
            <button disabled={curQ===0} onClick={()=>setCurQ(p=>p-1)} style={{...btn("#fff",cv.ink2),border:`1.5px solid ${cv.border2}`,borderRadius:20,padding:".5rem 1.1rem",opacity:curQ===0?.35:1}}>← 이전</button>
            {!isLast?<button onClick={()=>setCurQ(p=>p+1)} style={{...btn("#fff",cv.ink2),border:`1.5px solid ${cv.border2}`,borderRadius:20,padding:".5rem 1.1rem"}}>다음 →</button>:<button onClick={()=>setCurQ(0)} style={{...btn(cv.lavLt,cv.lav),border:`1.5px solid ${cv.lavMd}`,borderRadius:20,padding:".5rem 1.1rem"}}>← 첫 문항으로</button>}
          </div>
        </div>
      </div>
    );
  }

  /* ════ REVIEW ════ */
  if(page==="review"&&submitted)return(
    <div style={{background:cv.bg,minHeight:"100vh"}}>{generating&&<Spinner prog={genProg}/>}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 1rem",height:52,background:"#fff",borderBottom:`2px solid ${cv.border}`,position:"sticky",top:0,zIndex:80}}>
        <span onClick={reset} style={{fontWeight:800,fontSize:".95rem",cursor:"pointer",color:cv.ink}}>화법과 작문 × 확률과 통계</span>
        <span style={{fontSize:".76rem",color:cv.muted}}>{submitted.stuName}</span>
      </div>
      <div style={{maxWidth:780,margin:"0 auto",padding:"1.4rem 1rem 4rem"}}>
        <div style={{textAlign:"center",marginBottom:"1.6rem"}}><h1 style={{fontWeight:800,fontSize:"1.45rem",color:cv.ink,marginBottom:".3rem"}}>활동지 제출 완료 🎉</h1></div>
        <div style={{display:"flex",flexDirection:"column",gap:".85rem",marginBottom:"1.4rem"}}>{questions.map(q=>{const a=submitted.answers[q.id]||{};return(<div key={q.id} style={crd()}><div style={{background:`linear-gradient(90deg,${cv.lavMd},${cv.mintMd})`,padding:".58rem 1rem",margin:"-1.2rem -1.2rem .9rem",display:"flex",justifyContent:"space-between",borderRadius:"11px 11px 0 0"}}><strong style={{fontSize:".9rem",color:cv.ink}}>{q.title}</strong><span style={{fontSize:".74rem",color:cv.ink2}}>{q.subject}</span></div><div style={{fontSize:".88rem",lineHeight:1.85,whiteSpace:"pre-wrap",color:cv.ink2}}>{buildFullAnswer(a,q)}</div></div>);})}</div>
        <div style={{...crd(),marginBottom:"1.3rem"}}><div style={{fontWeight:700,fontSize:".92rem",color:cv.ink2,marginBottom:".6rem"}}>📝 교사 추가 관찰</div><textarea style={{...inp(),height:78,resize:"vertical",background:"#fafcff",lineHeight:1.75}} value={tNote} onChange={e=>setTNote(e.target.value)} placeholder="수업 중 관찰 사항..."/></div>
        <button onClick={generate} disabled={generating} style={{...btn(`linear-gradient(135deg,${cv.lav},${cv.mint})`),width:"100%",padding:".9rem",fontSize:".97rem",borderRadius:10,opacity:generating?.6:1}}>✦ AI 교세특 자동 생성하기 ✦</button>
      </div>
    </div>
  );

  /* ════ RESULT ════ */
  if(page==="result"&&seteuk&&submitted)return(
    <div style={{background:cv.bg,minHeight:"100vh"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 1rem",height:52,background:"#fff",borderBottom:`2px solid ${cv.border}`,position:"sticky",top:0,zIndex:80}}>
        <span onClick={reset} style={{fontWeight:800,fontSize:".95rem",cursor:"pointer",color:cv.ink}}>화법과 작문 × 확률과 통계</span>
      </div>
      <div style={{maxWidth:680,margin:"0 auto",padding:"2rem 1rem 4rem"}}>
        <div style={{textAlign:"center",marginBottom:"1.6rem"}}><h1 style={{fontWeight:800,fontSize:"1.45rem",color:cv.ink,marginBottom:".3rem"}}>교세특 생성 완료</h1></div>
        <div style={{...crd({padding:"1.8rem 2rem"}),position:"relative",marginBottom:"1.3rem"}}>
          <div style={{position:"absolute",top:-11,left:"1.2rem",background:cv.lavMd,padding:".08rem .55rem",fontSize:".68rem",fontWeight:700,color:cv.ink,borderRadius:18}}>세부능력 및 특기사항</div>
          <p style={{fontSize:".92rem",lineHeight:2.05,color:cv.ink,whiteSpace:"pre-wrap",wordBreak:"keep-all"}}>{seteuk}</p>
          <div style={{textAlign:"right",marginTop:".8rem",paddingTop:".7rem",borderTop:`1px solid ${cv.border}`,fontSize:".76rem",color:cv.muted}}>{seteuk.length}자</div>
        </div>
        <div style={{display:"flex",gap:".7rem",flexWrap:"wrap"}}>
          <button onClick={()=>navigator.clipboard.writeText(seteuk).then(()=>alert("복사!")).catch(()=>{})} style={{...btn(`linear-gradient(135deg,${cv.mint},#27ae60)`),flex:1,padding:".75rem",minWidth:90}}>📋 복사</button>
          <button onClick={()=>{setSeteuk(null);setPage("review");}} style={{...btn("#fff",cv.ink),border:`1.5px solid ${cv.border2}`,flex:1,padding:".75rem",minWidth:90}}>↺ 재생성</button>
          <button onClick={reset} style={{...btn("#fff",cv.muted),border:`1px solid ${cv.border}`,flex:1,padding:".75rem",minWidth:90}}>처음으로</button>
        </div>
      </div>
    </div>
  );
  return null;
}
function AG({value,onChange,placeholder,style={},minH=52}){
  const r=useRef(null);
  useEffect(()=>{if(r.current){r.current.style.height="auto";r.current.style.height=Math.max(r.current.scrollHeight,minH)+"px";}},[value]);
  return <textarea ref={r} className="ag" value={value||""} onChange={onChange} placeholder={placeholder} style={{minHeight:minH,...style}}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
